<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — DevForm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body style="margin:0;padding:0;min-height:100vh;background:#0a0a0f;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow-x:hidden;">

  <!-- Background grid -->
  <div style="position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;"></div>

  <!-- Glow blobs -->
  <div style="position:fixed;top:-100px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.15) 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:fixed;bottom:-150px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 70%);pointer-events:none;"></div>

  <!-- Card -->
  <div style="position:relative;width:100%;max-width:520px;margin:40px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 44px;backdrop-filter:blur(12px);box-shadow:0 0 80px rgba(0,0,0,0.5);">

    <!-- Header -->
    <div style="margin-bottom:36px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#10b981);border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:18px;">⚡</span>
        </div>
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-0.5px;">DevForm</span>
      </div>
      <h1 style="font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#fff;margin:0 0 8px;letter-spacing:-1px;">Create Account</h1>
      <p style="color:#6b7280;font-size:14px;margin:0;font-weight:300;">Fill in your details below. All fields are validated in real-time.</p>
    </div>

    <!-- Global error/success banner -->
    <div id="banner" style="display:none;padding:14px 18px;border-radius:12px;font-size:14px;font-weight:500;margin-bottom:24px;transition:all .3s;"></div>

    <!-- Form -->
    <form id="regForm" novalidate>

      <!-- Full Name -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Full Name</label>
        <div style="position:relative;">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">👤</span>
          <input id="name" type="text" placeholder="Jane Smith"
            style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px 14px 44px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;"
            onfocus="focusField(this)" onblur="validateName()" oninput="validateName()"/>
        </div>
        <p id="nameErr" style="display:none;color:#f87171;font-size:12px;margin:6px 0 0 4px;font-weight:500;"></p>
      </div>

      <!-- Email -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Email Address</label>
        <div style="position:relative;">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">✉️</span>
          <input id="email" type="email" placeholder="jane@example.com"
            style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px 14px 44px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;"
            onfocus="focusField(this)" onblur="validateEmail()" oninput="validateEmail()"/>
        </div>
        <p id="emailErr" style="display:none;color:#f87171;font-size:12px;margin:6px 0 0 4px;font-weight:500;"></p>
      </div>

      <!-- Phone -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Phone Number</label>
        <div style="position:relative;">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">📱</span>
          <input id="phone" type="tel" placeholder="+91 9876543210" maxlength="15"
            style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px 14px 44px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;"
            onfocus="focusField(this)" onblur="validatePhone()" oninput="validatePhone()"/>
        </div>
        <p id="phoneErr" style="display:none;color:#f87171;font-size:12px;margin:6px 0 0 4px;font-weight:500;"></p>
      </div>

      <!-- Age -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Age</label>
        <div style="position:relative;">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🎂</span>
          <input id="age" type="number" placeholder="25" min="1" max="120"
            style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px 14px 44px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;"
            onfocus="focusField(this)" onblur="validateAge()" oninput="validateAge()"/>
        </div>
        <p id="ageErr" style="display:none;color:#f87171;font-size:12px;margin:6px 0 0 4px;font-weight:500;"></p>
      </div>

      <!-- Password -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Password</label>
        <div style="position:relative;">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🔒</span>
          <input id="password" type="password" placeholder="Min. 8 chars with number & symbol"
            style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 44px 14px 44px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;"
            onfocus="focusField(this)" onblur="validatePassword()" oninput="validatePassword()"/>
          <span onclick="togglePass('password','eyePass')" id="eyePass" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;user-select:none;">👁️</span>
        </div>
        <!-- Strength bar -->
        <div style="margin-top:8px;display:flex;gap:4px;">
          <div id="s1" style="height:3px;flex:1;border-radius:4px;background:rgba(255,255,255,0.08);transition:background .3s;"></div>
          <div id="s2" style="height:3px;flex:1;border-radius:4px;background:rgba(255,255,255,0.08);transition:background .3s;"></div>
          <div id="s3" style="height:3px;flex:1;border-radius:4px;background:rgba(255,255,255,0.08);transition:background .3s;"></div>
          <div id="s4" style="height:3px;flex:1;border-radius:4px;background:rgba(255,255,255,0.08);transition:background .3s;"></div>
        </div>
        <p id="passErr" style="display:none;color:#f87171;font-size:12px;margin:6px 0 0 4px;font-weight:500;"></p>
      </div>

      <!-- Confirm Password -->
      <div style="margin-bottom:28px;">
        <label style="display:block;font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Confirm Password</label>
        <div style="position:relative;">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🔑</span>
          <input id="confirmPass" type="password" placeholder="Repeat your password"
            style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 44px 14px 44px;color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;"
            onfocus="focusField(this)" onblur="validateConfirm()" oninput="validateConfirm()"/>
          <span onclick="togglePass('confirmPass','eyeConfirm')" id="eyeConfirm" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;user-select:none;">👁️</span>
        </div>
        <p id="confirmErr" style="display:none;color:#f87171;font-size:12px;margin:6px 0 0 4px;font-weight:500;"></p>
      </div>

      <!-- Submit -->
      <button id="submitBtn" type="submit"
        style="width:100%;padding:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;letter-spacing:-0.3px;cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 8px 32px rgba(99,102,241,0.4);"
        onmouseover="this.style.opacity='.88';this.style.transform='translateY(-1px)'"
        onmouseout="this.style.opacity='1';this.style.transform='translateY(0)'"
        onmousedown="this.style.transform='translateY(1px)'"
        onmouseup="this.style.transform='translateY(-1px)'">
        Register Now →
      </button>

    </form>

    <!-- Footer note -->
    <p style="text-align:center;color:#4b5563;font-size:12px;margin:20px 0 0;font-weight:300;">Already have an account? <a href="#" style="color:#6366f1;text-decoration:none;font-weight:500;">Sign in</a></p>

  </div>

  <!-- Submitted records panel -->
  <div id="recordsPanel" style="display:none;position:fixed;bottom:24px;right:24px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:16px;padding:20px 24px;max-width:320px;backdrop-filter:blur(12px);">
    <p style="font-family:'Syne',sans-serif;font-weight:700;color:#10b981;font-size:14px;margin:0 0 8px;">✅ Registered Users</p>
    <div id="recordsList" style="font-size:13px;color:#d1fae5;"></div>
  </div>

<script>
  /* ── Utility ── */
  function setFieldState(id, state) {
    const el = document.getElementById(id);
    if (!el) return;
    const colors = { error:'#ef4444', ok:'#10b981', idle:'rgba(255,255,255,0.1)' };
    const glow   = { error:'0 0 0 3px rgba(239,68,68,0.15)', ok:'0 0 0 3px rgba(16,185,129,0.15)', idle:'none' };
    el.style.borderColor  = colors[state];
    el.style.boxShadow    = glow[state];
  }
  function showErr(errId, msg) {
    const el = document.getElementById(errId);
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }
  function focusField(el) {
    el.style.borderColor = '#6366f1';
    el.style.boxShadow   = '0 0 0 3px rgba(99,102,241,0.18)';
  }
  function togglePass(inputId, eyeId) {
    const inp = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    eye.textContent = inp.type === 'password' ? '👁️' : '🙈';
  }

  /* ── Field validators ── */
  function validateName() {
    const v = document.getElementById('name').value.trim();
    if (!v)               { setFieldState('name','error'); showErr('nameErr','Name is required.'); return false; }
    if (v.length < 2)     { setFieldState('name','error'); showErr('nameErr','Name must be at least 2 characters.'); return false; }
    if (!/^[a-zA-Z\s'-]+$/.test(v)) { setFieldState('name','error'); showErr('nameErr','Name may only contain letters, spaces, hyphens or apostrophes.'); return false; }
    setFieldState('name','ok'); showErr('nameErr',''); return true;
  }
  function validateEmail() {
    const v = document.getElementById('email').value.trim();
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (!v)          { setFieldState('email','error'); showErr('emailErr','Email is required.'); return false; }
    if (!re.test(v)) { setFieldState('email','error'); showErr('emailErr','Enter a valid email (e.g. user@domain.com).'); return false; }
    setFieldState('email','ok'); showErr('emailErr',''); return true;
  }
  function validatePhone() {
    const v = document.getElementById('phone').value.trim();
    const re = /^[+]?[\d\s\-().]{7,15}$/;
    if (!v)          { setFieldState('phone','error'); showErr('phoneErr','Phone number is required.'); return false; }
    if (!re.test(v)) { setFieldState('phone','error'); showErr('phoneErr','Enter a valid phone number (7–15 digits).'); return false; }
    setFieldState('phone','ok'); showErr('phoneErr',''); return true;
  }
  function validateAge() {
    const v = parseInt(document.getElementById('age').value, 10);
    if (!v && v !== 0) { setFieldState('age','error'); showErr('ageErr','Age is required.'); return false; }
    if (v < 1 || v > 120) { setFieldState('age','error'); showErr('ageErr','Age must be between 1 and 120.'); return false; }
    setFieldState('age','ok'); showErr('ageErr',''); return true;
  }
  function validatePassword() {
    const v = document.getElementById('password').value;
    const segments = [s1,s2,s3,s4];
    const bars = ['#ef4444','#f97316','#eab308','#10b981'];
    let score = 0;
    if (v.length >= 8)           score++;
    if (/[A-Z]/.test(v))         score++;
    if (/[0-9]/.test(v))         score++;
    if (/[^a-zA-Z0-9]/.test(v))  score++;
    segments.forEach((s,i) => { s.style.background = i < score ? bars[Math.min(score-1,3)] : 'rgba(255,255,255,0.08)'; });
    if (!v)      { setFieldState('password','error'); showErr('passErr','Password is required.'); return false; }
    if (v.length < 8) { setFieldState('password','error'); showErr('passErr','Password must be at least 8 characters.'); return false; }
    if (!/[A-Z]/.test(v))        { setFieldState('password','error'); showErr('passErr','Include at least one uppercase letter.'); return false; }
    if (!/[0-9]/.test(v))        { setFieldState('password','error'); showErr('passErr','Include at least one number.'); return false; }
    if (!/[^a-zA-Z0-9]/.test(v)) { setFieldState('password','error'); showErr('passErr','Include at least one special character (!, @, #…).'); return false; }
    setFieldState('password','ok'); showErr('passErr','');
    validateConfirm(); // re-check confirm when password changes
    return true;
  }
  function validateConfirm() {
    const p  = document.getElementById('password').value;
    const cp = document.getElementById('confirmPass').value;
    if (!cp)     { setFieldState('confirmPass','error'); showErr('confirmErr','Please confirm your password.'); return false; }
    if (p !== cp){ setFieldState('confirmPass','error'); showErr('confirmErr','Passwords do not match.'); return false; }
    setFieldState('confirmPass','ok'); showErr('confirmErr',''); return true;
  }

  /* ── Banner ── */
  function showBanner(msg, type) {
    const b = document.getElementById('banner');
    const styles = {
      success: { bg:'rgba(16,185,129,0.12)', border:'rgba(16,185,129,0.3)', color:'#34d399' },
      error:   { bg:'rgba(239,68,68,0.1)',   border:'rgba(239,68,68,0.3)',   color:'#f87171' }
    };
    const s = styles[type];
    b.style.background   = s.bg;
    b.style.border       = `1px solid ${s.border}`;
    b.style.color        = s.color;
    b.textContent        = msg;
    b.style.display      = 'block';
    setTimeout(() => { b.style.display = 'none'; }, 5000);
  }

  /* ── Form submit ── */
  document.getElementById('regForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const checks = [validateName(), validateEmail(), validatePhone(), validateAge(), validatePassword(), validateConfirm()];
    if (checks.includes(false)) { showBanner('⚠️ Please fix the highlighted errors before submitting.', 'error'); return; }

    const payload = {
      name:     document.getElementById('name').value.trim(),
      email:    document.getElementById('email').value.trim(),
      phone:    document.getElementById('phone').value.trim(),
      age:      parseInt(document.getElementById('age').value, 10),
      password: document.getElementById('password').value
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Registering…';
    btn.style.opacity = '0.7';

    try {
      const res  = await fetch('/register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      const data = await res.json();

      if (res.ok) {
        showBanner('🎉 ' + data.message, 'success');
        document.getElementById('regForm').reset();
        ['name','email','phone','age','password','confirmPass'].forEach(id => setFieldState(id,'idle'));
        [s1,s2,s3,s4].forEach(s => s.style.background = 'rgba(255,255,255,0.08)');
        fetchRecords();
      } else {
        showBanner('❌ ' + (data.errors ? data.errors.join(' · ') : data.message), 'error');
      }
    } catch(err) {
      showBanner('🔌 Could not reach the server. Is it running?', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Register Now →';
    btn.style.opacity = '1';
  });

  /* ── Fetch registered users ── */
  async function fetchRecords() {
    try {
      const res  = await fetch('/users');
      const data = await res.json();
      if (!data.users || !data.users.length) return;
      document.getElementById('recordsPanel').style.display = 'block';
      document.getElementById('recordsList').innerHTML = data.users.map((u,i) =>
        `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:8px;">
          <span style="color:#6ee7b7;font-weight:600;">${i+1}.</span>
          <div><div style="color:#d1fae5;font-weight:500;">${u.name}</div><div style="color:#6b7280;font-size:11px;">${u.email}</div></div>
        </div>`
      ).join('');
    } catch(e) {}
  }

  // Load existing records on page load
  fetchRecords();
</script>
</body>
</html>
